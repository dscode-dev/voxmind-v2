apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voxmind-control-plane
  template:
    metadata:
      labels:
        app: voxmind-control-plane
    spec:
      serviceAccountName: voxmind-control-plane
      containers:
        - name: api
          image: CHANGE_ME/control-plane:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: VOXMIND_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WORKER_JOB_IMAGE
              value: "CHANGE_ME/worker:0.1.0"
            - name: WORKER_JOB_TTL
              value: "3600"
            - name: WORKER_JOB_DEADLINE
              value: "21600"
            - name: WORKER_CPU_REQUEST
              value: "1000m"
            - name: WORKER_CPU_LIMIT
              value: "2000m"
            - name: WORKER_MEM_REQUEST
              value: "2Gi"
            - name: WORKER_MEM_LIMIT
              value: "4Gi"
            - name: CONTROL_PLANE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voxmind-secrets
                  key: CONTROL_PLANE_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voxmind-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: voxmind-secrets
                  key: TELEGRAM_CHAT_ID
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
spec:
  selector:
    app: voxmind-control-plane
  ports:
    - name: http
      port: 80
      targetPort: 8080
