apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voxmind-control-plane
  template:
    metadata:
      labels:
        app: voxmind-control-plane
    spec:
      containers:
        - name: control-plane
          image: konohalabs/voxmind-control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: voxmind-control-plane-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
spec:
  type: ClusterIP
  selector:
    app: voxmind-control-plane
  ports:
    - port: 8000
      targetPort: 8000