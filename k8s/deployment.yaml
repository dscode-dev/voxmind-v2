apiVersion: apps/v1
kind: Deployment
metadata:
  name: voxmind-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voxmind-v2
  template:
    metadata:
      labels:
        app: voxmind-v2
    spec:
      containers:
        - name: voxmind-v2
          image: voxmind-v2:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voxmind-v2-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voxmind-v2-secrets
                  key: OPENAI_API_KEY
            - name: CACHE_ENABLED
              value: "1"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: MOCK_LLM
              value: "0"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
