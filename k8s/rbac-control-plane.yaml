apiVersion: v1
kind: ServiceAccount
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create","get","list","watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: voxmind-control-plane
  namespace: voxmind-v2
subjects:
  - kind: ServiceAccount
    name: voxmind-control-plane
    namespace: voxmind-v2
roleRef:
  kind: Role
  name: voxmind-control-plane
  apiGroup: rbac.authorization.k8s.io
